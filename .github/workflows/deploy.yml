name: Build and Deploy to Production

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Setup Node.js environment
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.3
        with:
          version: 10
      - name: Install & Build
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: dist
          path: dist

  dockerize:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download a Build Artifact
        uses: actions/download-artifact@v7.0.0
        with:
          name: dist
          path: dist

      - name: GHCR Login
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/ai-paas-web:latest
            ghcr.io/${{ github.repository }}/ai-paas-web:${{ github.sha }}

  deploy:
    needs: dockerize
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          port: ${{ secrets.PORT }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/${{ github.repository }}/ai-paas-web:latest

            docker stop ai-paas-web || true
            docker rm ai-paas-web || true

            docker run -d \
              --name ai-paas-web \
              -p 80:80 \
              -e VITE_SERVER_URL=${{ secrets.SERVER_URL }} \
              --restart always \
              ghcr.io/${{ github.repository }}/ai-paas-web:latest

            docker image prune -f
